# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: salesforce-remove-from-permission-set
description: Remove a user from a permission set in Salesforce

# Input parameters for web form generation
inputs:
  username:
    type: text
    description: Salesforce username (email) of the user to remove from permission set
    required: true
    validation:
      min: 1
      max: 255

  permissionSetId:
    type: text
    description: The ID of the permission set to remove the user from
    required: true
    validation:
      min: 1
      max: 100

  address:
    type: text
    description: Optional Salesforce API base URL override
    required: false
    validation:
      min: 1
      max: 100

# Expected output structure
outputs:
  status:
    type: text
    description: Operation result (success, failed, recovered, etc.)

  username:
    type: text
    description: The username that was processed

  userId:
    type: text
    description: The Salesforce User ID

  permissionSetId:
    type: text
    description: The permission set ID

  assignmentId:
    type: text
    description: The permission set assignment ID that was removed (if found)

  removed:
    type: boolean
    description: Whether the permission set assignment was actually removed

  address:
    type: text
    description: The Salesforce API base URL used

environment:
  ADDRESS:
    type: text
    description: Base URL for the API
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false

secrets:
  BEARER_AUTH_TOKEN:
    type: text
    description: Bearer auth token
    required: false
  BASIC_USERNAME:
    type: text
    description: Basic auth username
    required: false
  BASIC_PASSWORD:
    type: text
    description: Basic auth password
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret
    required: false
  OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN:
    type: text
    description: OAuth2 authorization code access token
    required: false

optional_one_of:
  - ["secrets.BEARER_AUTH_TOKEN"]
  - ["secrets.BASIC_USERNAME", "secrets.BASIC_PASSWORD"]
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
    ]
  - ["secrets.OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN"]
